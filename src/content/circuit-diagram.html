<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Diagram — Aim-Assist Hardware System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0e1a;
    --bg-surface: #0f1526;
    --grid-line: rgba(40, 60, 100, 0.25);
    --grid-line-major: rgba(50, 75, 120, 0.35);
    --text-primary: #c8d6e5;
    --text-bright: #e8f0fa;
    --text-dim: #5a6a80;
    --accent-red: #ff4757;
    --accent-orange: #ff9f43;
    --accent-green: #26de81;
    --accent-blue: #45aaf2;
    --accent-cyan: #0abde3;
    --accent-purple: #a55eea;
    --wire-power: #ff4757;
    --wire-signal: #ff9f43;
    --wire-12v: #c0392b;
    --wire-ground: #636e72;
    --wire-ethernet: #26de81;
    --box-jetson: #26de81;
    --box-rpi: #45aaf2;
    --box-power: #ff4757;
    --box-relay: #a55eea;
    --box-tos: #45aaf2;
    --tooltip-bg: rgba(10, 14, 26, 0.95);
    --tooltip-border: rgba(69, 170, 242, 0.4);
    --glow-power: rgba(255, 71, 87, 0.3);
    --glow-signal: rgba(255, 159, 67, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: grab;
  }
  body.dragging { cursor: grabbing; }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 12px 24px;
    background: linear-gradient(180deg, rgba(10,14,26,0.95) 0%, rgba(10,14,26,0) 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
  }
  #header > * { pointer-events: auto; }
  #header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  #header h1 span { color: var(--accent-cyan); }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .controls button {
    background: var(--bg-surface);
    border: 1px solid rgba(69,170,242,0.2);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .controls button:hover {
    border-color: var(--accent-cyan);
    color: var(--text-bright);
    box-shadow: 0 0 12px rgba(10,189,227,0.15);
  }
  .zoom-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 48px;
    text-align: center;
  }

  #legend {
    position: fixed;
    bottom: 16px; left: 16px;
    z-index: 100;
    background: rgba(15, 21, 38, 0.92);
    border: 1px solid rgba(69,170,242,0.15);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 11px;
    backdrop-filter: blur(8px);
  }
  #legend h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    color: var(--text-primary);
  }
  .legend-line {
    width: 24px;
    height: 3px;
    border-radius: 1px;
  }

  #svg-container {
    width: 100vw;
    height: 100vh;
  }

  svg { width: 100%; height: 100%; }

  /* Component hover effects */
  .component { cursor: pointer; }
  .component:hover .comp-box {
    filter: brightness(1.3);
    stroke-width: 2.5;
  }
  .component:hover .comp-label {
    fill: var(--text-bright);
  }

  /* Wire hover glow */
  .wire { transition: filter 0.2s; }
  .wire:hover {
    filter: drop-shadow(0 0 6px currentColor);
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    z-index: 200;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #tooltip .tt-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    color: var(--accent-cyan);
    margin-bottom: 4px;
  }
  #tooltip .tt-body {
    color: var(--text-primary);
    font-size: 11px;
  }

  /* Animations */
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  .pulse { animation: pulse-glow 2s ease-in-out infinite; }

  @keyframes dash-flow {
    to { stroke-dashoffset: -20; }
  }
  .data-flow {
    stroke-dasharray: 8 4;
    animation: dash-flow 1s linear infinite;
  }
</style>
</head>
<body>
<div id="header">
  <h1><span>//</span> Hardware System Schematic <span>v1.0</span></h1>
  <div class="controls">
    <button onclick="zoomIn()">+</button>
    <span class="zoom-display" id="zoomLevel">100%</span>
    <button onclick="zoomOut()">&minus;</button>
    <button onclick="resetView()">Reset</button>
  </div>
</div>

<div id="legend">
  <h3>Wire Legend</h3>
  <div class="legend-item"><div class="legend-line" style="background:#ff4757"></div> 5V Power</div>
  <div class="legend-item"><div class="legend-line" style="background:#c0392b"></div> 12V Power</div>
  <div class="legend-item"><div class="legend-line" style="background:#ff9f43"></div> SPI / Signal</div>
  <div class="legend-item"><div class="legend-line" style="background:#26de81"></div> Ethernet</div>
  <div class="legend-item"><div class="legend-line" style="background:#636e72"></div> Ground</div>
</div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-body"></div>
</div>

<div id="svg-container">
<svg id="diagram" viewBox="0 0 1300 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(40,60,100,0.15)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(50,75,120,0.25)" stroke-width="0.8"/>
    </pattern>
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#45aaf2"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#ff4757"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1300" height="820" fill="#0a0e1a"/>
  <rect width="1300" height="820" fill="url(#grid)"/>

  <!-- ============================================ -->
  <!-- BIG RED ENCLOSURE (relay/MOSFET/HID area)    -->
  <!-- ============================================ -->
  <rect x="830" y="260" width="410" height="230" rx="6" fill="rgba(255,71,87,0.03)" stroke="#ff4757" stroke-width="2" stroke-opacity="0.6"/>

  <!-- ============================================ -->
  <!-- ANNOTATIONS                                  -->
  <!-- ============================================ -->

  <!-- Jetson annotations — all BELOW the Jetson box, horizontally aligned -->
  <text x="185" y="340" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a8a52" font-weight="500" opacity="0.85">
    Valorant: custom fine-tuned YOLO-11 model
  </text>
  <text x="185" y="356" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a8a52" font-weight="500" opacity="0.85">
    HSV color filtering for target detection
  </text>
  <circle cx="355" cy="353" r="3" fill="#ff4757" opacity="0.6"/>
  <circle cx="363" cy="353" r="3" fill="#ff4757" opacity="0.4"/>
  <circle cx="371" cy="353" r="3" fill="#ff4757" opacity="0.3"/>
  <text x="185" y="372" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a8a52" font-weight="500" opacity="0.85">
    Dynamic adjustment &amp; real-time inference
  </text>

  <!-- Arm Control label -->
  <text x="850" y="32" font-family="JetBrains Mono, monospace" font-size="13" fill="#45aaf2" font-weight="600" text-anchor="middle">
    ARM CONTROL
  </text>
  <line x1="790" y1="38" x2="790" y2="62" stroke="#45aaf2" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="850" y1="38" x2="850" y2="62" stroke="#45aaf2" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="910" y1="38" x2="910" y2="62" stroke="#45aaf2" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Wrist Control label — below motor -->
  <text x="660" y="520" font-family="JetBrains Mono, monospace" font-size="11" fill="#45aaf2" font-weight="600" text-anchor="middle">
    WRIST
  </text>
  <text x="660" y="533" font-family="JetBrains Mono, monospace" font-size="11" fill="#45aaf2" font-weight="600" text-anchor="middle">
    CONTROL
  </text>
  <line x1="660" y1="498" x2="660" y2="510" stroke="#45aaf2" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- PID Controls label -->
  <text x="580" y="445" font-family="JetBrains Mono, monospace" font-size="10" fill="#45aaf2" font-weight="500" opacity="0.85">
    PID Controls
  </text>

  <!-- HID label — below HID device, with arrow -->
  <line x1="1155" y1="400" x2="1155" y2="418" stroke="#45aaf2" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="1155" y="435" font-family="JetBrains Mono, monospace" font-size="13" fill="#45aaf2" font-weight="700" text-anchor="middle">
    HID
  </text>

  <!-- ============================================ -->
  <!-- COMPONENTS                                   -->
  <!-- ============================================ -->

  <!-- 1. CAMERA -->
  <g class="component" data-tooltip="Camera" data-desc="Video input device feeding frames to Jetson Orin Nano for real-time object detection and tracking.">
    <rect class="comp-box" x="55" y="225" width="80" height="55" rx="4" fill="none" stroke="#5a6a80" stroke-width="1.5"/>
    <circle cx="95" cy="248" r="14" fill="none" stroke="#8395a7" stroke-width="1.5"/>
    <circle cx="95" cy="248" r="6" fill="#8395a7" opacity="0.4"/>
    <circle cx="95" cy="248" r="2.5" fill="#c8d6e5"/>
    <text class="comp-label" x="95" y="275" font-family="JetBrains Mono, monospace" font-size="9" fill="#8395a7" text-anchor="middle" font-weight="500">CAMERA</text>
  </g>

  <!-- 2. JETSON ORIN NANO -->
  <g class="component" data-tooltip="Jetson Orin Nano" data-desc="NVIDIA edge AI module running custom fine-tuned YOLO-11 model for Valorant with HSV color filtering and dynamic real-time adjustment.">
    <rect class="comp-box" x="185" y="205" width="155" height="115" rx="5" fill="rgba(38,222,129,0.06)" stroke="#26de81" stroke-width="2"/>
    <rect x="230" y="230" width="60" height="40" rx="3" fill="none" stroke="#26de81" stroke-width="1" opacity="0.5"/>
    <rect x="245" y="240" width="30" height="20" rx="2" fill="rgba(38,222,129,0.15)" stroke="#26de81" stroke-width="0.8"/>
    <line x1="235" y1="228" x2="235" y2="222" stroke="#26de81" stroke-width="0.8" opacity="0.5"/>
    <line x1="250" y1="228" x2="250" y2="222" stroke="#26de81" stroke-width="0.8" opacity="0.5"/>
    <line x1="265" y1="228" x2="265" y2="222" stroke="#26de81" stroke-width="0.8" opacity="0.5"/>
    <line x1="280" y1="228" x2="280" y2="222" stroke="#26de81" stroke-width="0.8" opacity="0.5"/>
    <line x1="235" y1="272" x2="235" y2="278" stroke="#26de81" stroke-width="0.8" opacity="0.5"/>
    <line x1="250" y1="272" x2="250" y2="278" stroke="#26de81" stroke-width="0.8" opacity="0.5"/>
    <line x1="265" y1="272" x2="265" y2="278" stroke="#26de81" stroke-width="0.8" opacity="0.5"/>
    <line x1="280" y1="272" x2="280" y2="278" stroke="#26de81" stroke-width="0.8" opacity="0.5"/>
    <text class="comp-label" x="262" y="296" font-family="JetBrains Mono, monospace" font-size="11" fill="#26de81" text-anchor="middle" font-weight="600">JETSON ORIN</text>
    <text class="comp-label" x="262" y="312" font-family="JetBrains Mono, monospace" font-size="11" fill="#26de81" text-anchor="middle" font-weight="600">NANO</text>
  </g>

  <!-- 3. RASPBERRY PI -->
  <g class="component" data-tooltip="Raspberry Pi" data-desc="Central controller. Connects to Jetson via Ethernet, drives SPI bus to Tos7000 servo drivers, controls relay via transistor, and runs PID motor control.">
    <rect class="comp-box" x="420" y="175" width="180" height="250" rx="5" fill="rgba(69,170,242,0.05)" stroke="#45aaf2" stroke-width="2"/>
    <rect x="440" y="200" width="140" height="80" rx="3" fill="none" stroke="#45aaf2" stroke-width="0.8" opacity="0.3"/>
    <rect x="455" y="215" width="50" height="30" rx="2" fill="rgba(69,170,242,0.1)" stroke="#45aaf2" stroke-width="0.7"/>
    <g opacity="0.5">
      <rect x="520" y="210" width="45" height="60" rx="1" fill="none" stroke="#45aaf2" stroke-width="0.6"/>
      <line x1="528" y1="218" x2="528" y2="262" stroke="#45aaf2" stroke-width="0.5" stroke-dasharray="3 3"/>
      <line x1="536" y1="218" x2="536" y2="262" stroke="#45aaf2" stroke-width="0.5" stroke-dasharray="3 3"/>
      <line x1="544" y1="218" x2="544" y2="262" stroke="#45aaf2" stroke-width="0.5" stroke-dasharray="3 3"/>
      <line x1="552" y1="218" x2="552" y2="262" stroke="#45aaf2" stroke-width="0.5" stroke-dasharray="3 3"/>
    </g>
    <text class="comp-label" x="510" y="310" font-family="JetBrains Mono, monospace" font-size="13" fill="#45aaf2" text-anchor="middle" font-weight="700">RASPBERRY PI</text>

    <!-- Pin labels on right side -->
    <text x="604" y="200" font-family="JetBrains Mono, monospace" font-size="8" fill="#ff4757" font-weight="500">5V</text>
    <text x="604" y="218" font-family="JetBrains Mono, monospace" font-size="8" fill="#ff9f43" font-weight="500">SDI1</text>
    <text x="604" y="236" font-family="JetBrains Mono, monospace" font-size="8" fill="#ff9f43" font-weight="500">SDI2</text>
    <text x="604" y="254" font-family="JetBrains Mono, monospace" font-size="8" fill="#ff9f43" font-weight="500">CLK/CS</text>
    <circle cx="600" cy="197" r="3" fill="#ff4757"/>
    <circle cx="600" cy="215" r="3" fill="#ff9f43"/>
    <circle cx="600" cy="233" r="3" fill="#ff9f43"/>
    <circle cx="600" cy="251" r="3" fill="#ff9f43"/>

    <!-- Bottom-left pins -->
    <text x="425" y="393" font-family="JetBrains Mono, monospace" font-size="8" fill="#636e72" font-weight="500">GND</text>
    <text x="425" y="413" font-family="JetBrains Mono, monospace" font-size="8" fill="#ff9f43" font-weight="500">SC</text>
    <text x="425" y="420" font-family="JetBrains Mono, monospace" font-size="8" fill="#ff9f43" font-weight="500"></text>
    <circle cx="420" cy="390" r="3" fill="#636e72"/>
    <circle cx="420" cy="410" r="3" fill="#ff9f43"/>

    <!-- MC pin on bottom -->
    <text x="560" y="430" font-family="JetBrains Mono, monospace" font-size="8" fill="#ff9f43" font-weight="500">MC</text>
    <circle cx="555" cy="425" r="3" fill="#ff9f43"/>
  </g>

  <!-- 4. TOS7000 CH1 -->
  <g class="component" data-tooltip="Tos7000 CH1" data-desc="Servo/motor driver IC (Channel 1) for arm control. Connected via SPI interface (SDI1, CLK, CS) from Raspberry Pi.">
    <rect class="comp-box" x="720" y="80" width="120" height="70" rx="4" fill="rgba(69,170,242,0.05)" stroke="#45aaf2" stroke-width="1.5"/>
    <text class="comp-label" x="780" y="110" font-family="JetBrains Mono, monospace" font-size="10" fill="#45aaf2" text-anchor="middle" font-weight="600">TOS7000</text>
    <text x="780" y="124" font-family="JetBrains Mono, monospace" font-size="9" fill="#45aaf2" text-anchor="middle" opacity="0.7">CH1</text>
    <line x1="745" y1="80" x2="745" y2="62" stroke="#45aaf2" stroke-width="1.5"/>
    <line x1="765" y1="80" x2="765" y2="62" stroke="#45aaf2" stroke-width="1.5"/>
    <line x1="785" y1="80" x2="785" y2="62" stroke="#45aaf2" stroke-width="1.5"/>

  <!-- 5. TOS7000 CH2 -->
  <g class="component" data-tooltip="Tos7000 CH2" data-desc="Servo/motor driver IC (Channel 2) for arm control. Connected via SPI interface (SDI2, CLK, CS) from Raspberry Pi.">

    <text class="comp-label" x="930" y="110" font-family="JetBrains Mono, monospace" font-size="10" fill="#45aaf2" text-anchor="middle" font-weight="600">TOS7000</text>

    <line x1="895" y1="80" x2="895" y2="62" stroke="#45aaf2" stroke-width="1.5"/>
    <line x1="915" y1="80" x2="915" y2="62" stroke="#45aaf2" stroke-width="1.5"/>
    <line x1="935" y1="80" x2="935" y2="62" stroke="#45aaf2" stroke-width="1.5"/>
    <line x1="955" y1="80" x2="955" y2="62" stroke="#45aaf2" stroke-width="1.5"/>
    <circle cx="895" cy="62" r="2.5" fill="#45aaf2"/>
    <circle cx="915" cy="62" r="2.5" fill="#45aaf2"/>

    <text x="925" y="56" font-family="JetBrains Mono, monospace" font-size="7" fill="#45aaf2" text-anchor="middle" opacity="0.6">x4</text>
  </g>

  <!-- 6. RESISTORS (2x 1k&#937; in PARALLEL) -->
  <g class="component" data-tooltip="2x 1k&#937; Resistors (Parallel)" data-desc="Base current limiting resistors in parallel for NPN transistor. Limits current from Raspberry Pi SC pin to safe levels for transistor switching. Parallel configuration halves effective resistance to 500&#937;.">
    <!-- Input wire (left junction) -->
    <circle cx="685" cy="380" r="3" fill="#c8d6e5"/>
    <!-- Top branch: Resistor 1 -->
    <line x1="685" y1="380" x2="685" y2="365" stroke="#c8d6e5" stroke-width="1.5"/>
    <line x1="685" y1="365" x2="695" y2="365" stroke="#c8d6e5" stroke-width="1.5"/>
    <polyline points="695,365 698,358 706,372 714,358 722,372 730,358 733,365" fill="none" stroke="#c8d6e5" stroke-width="1.6" stroke-linejoin="round"/>
    <line x1="733" y1="365" x2="745" y2="365" stroke="#c8d6e5" stroke-width="1.5"/>
    <text x="714" y="356" font-family="JetBrains Mono, monospace" font-size="8" fill="#8395a7" text-anchor="middle">1k&#937;</text>
    <!-- Bottom branch: Resistor 2 -->
    <line x1="685" y1="380" x2="685" y2="395" stroke="#c8d6e5" stroke-width="1.5"/>

<script>
// ---- Pan & Zoom ----
const svg = document.getElementById('diagram');
const container = document.getElementById('svg-container');
let viewBox = { x: 0, y: 0, w: 1300, h: 820 };
let isPanning = false;
let startPoint = { x: 0, y: 0 };
let startViewBox = { x: 0, y: 0 };
const ZOOM_FACTOR = 0.9;
let scale = 1;

function updateViewBox() {
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
}

container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mouseX = viewBox.x + (e.clientX - rect.left) / rect.width * viewBox.w;
  const mouseY = viewBox.y + (e.clientY - rect.top) / rect.height * viewBox.h;

  const factor = e.deltaY > 0 ? 1 / ZOOM_FACTOR : ZOOM_FACTOR;
  const newW = viewBox.w * factor;
  const newH = viewBox.h * factor;

  // Clamp zoom
  if (newW < 300 || newW > 3000) return;

  viewBox.x = mouseX - (mouseX - viewBox.x) * factor;
  viewBox.y = mouseY - (mouseY - viewBox.y) * factor;
  viewBox.w = newW;
  viewBox.h = newH;
  scale = 1300 / viewBox.w;
  updateViewBox();
}, { passive: false });

container.addEventListener('mousedown', (e) => {
  if (e.target.closest('.component')) return;
  isPanning = true;
  document.body.classList.add('dragging');
  startPoint = { x: e.clientX, y: e.clientY };
  startViewBox = { x: viewBox.x, y: viewBox.y };
});

window.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - startPoint.x) / rect.width * viewBox.w;
  const dy = (e.clientY - startPoint.y) / rect.height * viewBox.h;
  viewBox.x = startViewBox.x - dx;
  viewBox.y = startViewBox.y - dy;
  updateViewBox();
});

window.addEventListener('mouseup', () => {
  isPanning = false;
  document.body.classList.remove('dragging');
});

function zoomIn() {
  const cx = viewBox.x + viewBox.w / 2;
  const cy = viewBox.y + viewBox.h / 2;
  const newW = viewBox.w * ZOOM_FACTOR;
  const newH = viewBox.h * ZOOM_FACTOR;
  if (newW < 300) return;
  viewBox.x = cx - newW / 2;
  viewBox.y = cy - newH / 2;
  viewBox.w = newW;
  viewBox.h = newH;
  scale = 1300 / viewBox.w;
  updateViewBox();
}

function zoomOut() {
  const cx = viewBox.x + viewBox.w / 2;
  const cy = viewBox.y + viewBox.h / 2;
  const newW = viewBox.w / ZOOM_FACTOR;
  const newH = viewBox.h / ZOOM_FACTOR;
  if (newW > 3000) return;
  viewBox.x = cx - newW / 2;
  viewBox.y = cy - newH / 2;
  viewBox.w = newW;
  viewBox.h = newH;
  scale = 1300 / viewBox.w;
  updateViewBox();
}

function resetView() {
  viewBox = { x: 0, y: 0, w: 1300, h: 820 };
  scale = 1;
  updateViewBox();
}

// ---- Tooltips ----
const tooltip = document.getElementById('tooltip');
const ttTitle = tooltip.querySelector('.tt-title');
const ttBody = tooltip.querySelector('.tt-body');

document.querySelectorAll('.component').forEach(comp => {
  comp.addEventListener('mouseenter', (e) => {
    const title = comp.getAttribute('data-tooltip');
    const desc = comp.getAttribute('data-desc');
    if (!title) return;
    ttTitle.textContent = title;
    ttBody.textContent = desc || '';
    tooltip.classList.add('visible');
  });

  comp.addEventListener('mousemove', (e) => {
    const x = e.clientX + 16;
    const y = e.clientY + 16;
    // Keep tooltip on screen
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    tooltip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 8 : x) + 'px';
    tooltip.style.top = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
  });

  comp.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
});

// ---- Touch support ----
let lastTouchDist = 0;
let lastTouchCenter = { x: 0, y: 0 };

container.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isPanning = true;
    startPoint = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    startViewBox = { x: viewBox.x, y: viewBox.y };
  } else if (e.touches.length === 2) {
    isPanning = false;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    lastTouchDist = Math.hypot(dx, dy);
    lastTouchCenter = {
      x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
      y: (e.touches[0].clientY + e.touches[1].clientY) / 2
    };
  }
}, { passive: true });

container.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && isPanning) {
    const rect = svg.getBoundingClientRect();
    const dx = (e.touches[0].clientX - startPoint.x) / rect.width * viewBox.w;
    const dy = (e.touches[0].clientY - startPoint.y) / rect.height * viewBox.h;
    viewBox.x = startViewBox.x - dx;
    viewBox.y = startViewBox.y - dy;
    updateViewBox();
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const dist = Math.hypot(dx, dy);
    const factor = lastTouchDist / dist;
    const rect = svg.getBoundingClientRect();
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const mouseX = viewBox.x + (cx - rect.left) / rect.width * viewBox.w;
    const mouseY = viewBox.y + (cy - rect.top) / rect.height * viewBox.h;
    const newW = viewBox.w * factor;
    const newH = viewBox.h * factor;
    if (newW >= 300 && newW <= 3000) {
      viewBox.x = mouseX - (mouseX - viewBox.x) * factor;
      viewBox.y = mouseY - (mouseY - viewBox.y) * factor;
      viewBox.w = newW;
      viewBox.h = newH;
      scale = 1300 / viewBox.w;
      updateViewBox();
    }
    lastTouchDist = dist;
  }
}, { passive: false });

container.addEventListener('touchend', () => { isPanning = false; });

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', (e) => {
  if (e.key === '+' || e.key === '=') zoomIn();
  else if (e.key === '-') zoomOut();
  else if (e.key === '0') resetView();
});
</script>
</body>
