<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Diagram — Aim-Assist Hardware System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #F3F2ED;
    --bg-surface: #E8E7E2;
    --grid-line: rgba(180, 175, 160, 0.25);
    --grid-line-major: rgba(160, 155, 140, 0.35);
    --text-primary: #3a3a3a;
    --text-bright: #1a1a1a;
    --text-dim: #8a8580;
    --accent-red: #d63031;
    --accent-orange: #e67e22;
    --accent-green: #16a34a;
    --accent-blue: #2563eb;
    --accent-cyan: #0891b2;
    --accent-purple: #7c3aed;
    --wire-power: #d63031;
    --wire-signal: #e67e22;
    --wire-12v: #991b1b;
    --wire-ground: #6b7280;
    --wire-ethernet: #16a34a;
    --box-jetson: #16a34a;
    --box-rpi: #2563eb;
    --box-power: #d63031;
    --box-relay: #7c3aed;
    --box-tos: #2563eb;
    --tooltip-bg: rgba(243, 242, 237, 0.96);
    --tooltip-border: rgba(37, 99, 235, 0.3);
    --glow-power: rgba(214, 48, 49, 0.15);
    --glow-signal: rgba(230, 126, 34, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: default;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 12px 24px;
    background: linear-gradient(180deg, rgba(243,242,237,0.95) 0%, rgba(243,242,237,0) 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
  }
  #header > * { pointer-events: auto; }
  #header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  #header h1 span { color: var(--accent-cyan); }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #legend {
    position: fixed;
    bottom: 16px; left: 16px;
    z-index: 100;
    background: rgba(243, 242, 237, 0.92);
    border: 1px solid rgba(37, 99, 235, 0.15);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 11px;
    backdrop-filter: blur(8px);
  }
  #legend h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    color: var(--text-primary);
  }
  .legend-line {
    width: 24px;
    height: 3px;
    border-radius: 1px;
  }

  #svg-container {
    width: 100vw;
    height: 100vh;
  }

  svg { width: 100%; height: 100%; }

  /* Component hover effects */
  .component { cursor: pointer; }
  .component:hover .comp-box {
    filter: brightness(1.3);
    stroke-width: 2.5;
  }
  .component:hover .comp-label {
    fill: var(--text-bright);
  }

  /* Wire hover glow */
  .wire { transition: filter 0.2s; }
  .wire:hover {
    filter: drop-shadow(0 0 6px currentColor);
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    z-index: 200;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }
  #tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #tooltip .tt-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    color: var(--accent-cyan);
    margin-bottom: 4px;
  }
  #tooltip .tt-body {
    color: var(--text-primary);
    font-size: 11px;
  }

  /* Animations */
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  .pulse { animation: pulse-glow 2s ease-in-out infinite; }

  @keyframes dash-flow {
    to { stroke-dashoffset: -20; }
  }
  .data-flow {
    stroke-dasharray: 8 4;
    animation: dash-flow 1s linear infinite;
  }
</style>
</head>
<body>
<div id="header">
  <h1><span>//</span> Hardware System Schematic <span>v1.0</span></h1>
</div>

<div id="legend">
  <h3>Wire Legend</h3>
  <div class="legend-item"><div class="legend-line" style="background:#d63031"></div> 5V Power</div>
  <div class="legend-item"><div class="legend-line" style="background:#991b1b"></div> 12V Power</div>
  <div class="legend-item"><div class="legend-line" style="background:#e67e22"></div> SPI / Signal</div>
  <div class="legend-item"><div class="legend-line" style="background:#16a34a"></div> Ethernet</div>
  <div class="legend-item"><div class="legend-line" style="background:#6b7280"></div> Ground</div>
</div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-body"></div>
</div>

<div id="svg-container">
<svg id="diagram" viewBox="0 0 1300 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(180,175,160,0.2)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(160,155,140,0.3)" stroke-width="0.8"/>
    </pattern>
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#d63031"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1300" height="820" fill="#F3F2ED"/>
  <rect width="1300" height="820" fill="url(#grid)"/>

  <!-- ============================================ -->
  <!-- BIG RED ENCLOSURE (relay/MOSFET/HID area)    -->
  <!-- ============================================ -->
  <rect x="830" y="260" width="410" height="230" rx="6" fill="rgba(214,48,49,0.04)" stroke="#d63031" stroke-width="2" stroke-opacity="0.4"/>

  <!-- ============================================ -->
  <!-- ANNOTATIONS                                  -->
  <!-- ============================================ -->

  <!-- Jetson annotations — all BELOW the Jetson box, horizontally aligned -->
  <text x="185" y="340" font-family="JetBrains Mono, monospace" font-size="9" fill="#15803d" font-weight="500" opacity="0.85">
    Valorant: custom fine-tuned YOLO-11 model
  </text>
  <text x="185" y="356" font-family="JetBrains Mono, monospace" font-size="9" fill="#15803d" font-weight="500" opacity="0.85">
    HSV color filtering for target detection
  </text>
  <circle cx="355" cy="353" r="3" fill="#d63031" opacity="0.6"/>
  <circle cx="363" cy="353" r="3" fill="#d63031" opacity="0.4"/>
  <circle cx="371" cy="353" r="3" fill="#d63031" opacity="0.3"/>
  <text x="185" y="372" font-family="JetBrains Mono, monospace" font-size="9" fill="#15803d" font-weight="500" opacity="0.85">
    Dynamic adjustment &amp; real-time inference
  </text>

  <!-- Arm Control label -->
  <text x="850" y="32" font-family="JetBrains Mono, monospace" font-size="13" fill="#2563eb" font-weight="600" text-anchor="middle">
    ARM CONTROL
  </text>
  <line x1="790" y1="38" x2="790" y2="62" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="850" y1="38" x2="850" y2="62" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="910" y1="38" x2="910" y2="62" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Wrist Control label — below motor -->
  <text x="660" y="520" font-family="JetBrains Mono, monospace" font-size="11" fill="#2563eb" font-weight="600" text-anchor="middle">
    WRIST
  </text>
  <text x="660" y="533" font-family="JetBrains Mono, monospace" font-size="11" fill="#2563eb" font-weight="600" text-anchor="middle">
    CONTROL
  </text>
  <line x1="660" y1="498" x2="660" y2="510" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- PID Controls label -->
  <text x="580" y="445" font-family="JetBrains Mono, monospace" font-size="10" fill="#2563eb" font-weight="500" opacity="0.85">
    PID Controls
  </text>

  <!-- HID label — below HID device, with arrow -->
  <line x1="1155" y1="400" x2="1155" y2="418" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="1155" y="435" font-family="JetBrains Mono, monospace" font-size="13" fill="#2563eb" font-weight="700" text-anchor="middle">
    HID
  </text>

  <!-- ============================================ -->
  <!-- COMPONENTS                                   -->
  <!-- ============================================ -->

  <!-- 1. CAMERA -->
  <g class="component" data-tooltip="Camera" data-desc="Video input device feeding frames to Jetson Orin Nano for real-time object detection and tracking.">
    <rect class="comp-box" x="55" y="225" width="80" height="55" rx="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
    <circle cx="95" cy="248" r="14" fill="none" stroke="#6b7280" stroke-width="1.5"/>
    <circle cx="95" cy="248" r="6" fill="#6b7280" opacity="0.4"/>
    <circle cx="95" cy="248" r="2.5" fill="#4a4a4a"/>
    <text class="comp-label" x="95" y="275" font-family="JetBrains Mono, monospace" font-size="9" fill="#6b7280" text-anchor="middle" font-weight="500">CAMERA</text>
  </g>

  <!-- 2. JETSON ORIN NANO -->
  <g class="component" data-tooltip="Jetson Orin Nano" data-desc="NVIDIA edge AI module running custom fine-tuned YOLO-11 model for Valorant with HSV color filtering and dynamic real-time adjustment.">
    <rect class="comp-box" x="185" y="205" width="155" height="115" rx="5" fill="rgba(22,163,74,0.06)" stroke="#16a34a" stroke-width="2"/>
    <rect x="230" y="230" width="60" height="40" rx="3" fill="none" stroke="#16a34a" stroke-width="1" opacity="0.5"/>
    <rect x="245" y="240" width="30" height="20" rx="2" fill="rgba(22,163,74,0.12)" stroke="#16a34a" stroke-width="0.8"/>
    <line x1="235" y1="228" x2="235" y2="222" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>
    <line x1="250" y1="228" x2="250" y2="222" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>
    <line x1="265" y1="228" x2="265" y2="222" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>
    <line x1="280" y1="228" x2="280" y2="222" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>
    <line x1="235" y1="272" x2="235" y2="278" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>
    <line x1="250" y1="272" x2="250" y2="278" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>
    <line x1="265" y1="272" x2="265" y2="278" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>
    <line x1="280" y1="272" x2="280" y2="278" stroke="#16a34a" stroke-width="0.8" opacity="0.5"/>
    <text class="comp-label" x="262" y="296" font-family="JetBrains Mono, monospace" font-size="11" fill="#16a34a" text-anchor="middle" font-weight="600">JETSON ORIN</text>
    <text class="comp-label" x="262" y="312" font-family="JetBrains Mono, monospace" font-size="11" fill="#16a34a" text-anchor="middle" font-weight="600">NANO</text>
  </g>

  <!-- 3. RASPBERRY PI -->
  <g class="component" data-tooltip="Raspberry Pi" data-desc="Central controller. Connects to Jetson via Ethernet, drives SPI bus to Tos7000 servo drivers, controls relay via transistor, and runs PID motor control.">
    <rect class="comp-box" x="420" y="175" width="180" height="250" rx="5" fill="rgba(37,99,235,0.05)" stroke="#2563eb" stroke-width="2"/>
    <rect x="440" y="200" width="140" height="80" rx="3" fill="none" stroke="#2563eb" stroke-width="0.8" opacity="0.3"/>
    <rect x="455" y="215" width="50" height="30" rx="2" fill="rgba(37,99,235,0.08)" stroke="#2563eb" stroke-width="0.7"/>
    <g opacity="0.5">
      <rect x="520" y="210" width="45" height="60" rx="1" fill="none" stroke="#2563eb" stroke-width="0.6"/>
      <line x1="528" y1="218" x2="528" y2="262" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="3 3"/>
      <line x1="536" y1="218" x2="536" y2="262" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="3 3"/>
      <line x1="544" y1="218" x2="544" y2="262" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="3 3"/>
      <line x1="552" y1="218" x2="552" y2="262" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="3 3"/>
    </g>
    <text class="comp-label" x="510" y="310" font-family="JetBrains Mono, monospace" font-size="13" fill="#2563eb" text-anchor="middle" font-weight="700">RASPBERRY PI</text>

    <!-- Pin labels on right side -->
    <text x="604" y="200" font-family="JetBrains Mono, monospace" font-size="8" fill="#d63031" font-weight="500">5V</text>
    <text x="604" y="218" font-family="JetBrains Mono, monospace" font-size="8" fill="#e67e22" font-weight="500">SDI1</text>
    <text x="604" y="236" font-family="JetBrains Mono, monospace" font-size="8" fill="#e67e22" font-weight="500">SDI2</text>
    <text x="604" y="254" font-family="JetBrains Mono, monospace" font-size="8" fill="#e67e22" font-weight="500">CLK/CS</text>
    <circle cx="600" cy="197" r="3" fill="#d63031"/>
    <circle cx="600" cy="215" r="3" fill="#e67e22"/>
    <circle cx="600" cy="233" r="3" fill="#e67e22"/>
    <circle cx="600" cy="251" r="3" fill="#e67e22"/>

    <!-- Bottom-left pins -->
    <text x="425" y="393" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7280" font-weight="500">GND</text>
    <text x="425" y="413" font-family="JetBrains Mono, monospace" font-size="8" fill="#e67e22" font-weight="500">SC</text>
    <text x="425" y="420" font-family="JetBrains Mono, monospace" font-size="8" fill="#e67e22" font-weight="500"></text>
    <circle cx="420" cy="390" r="3" fill="#6b7280"/>
    <circle cx="420" cy="410" r="3" fill="#e67e22"/>

    <!-- MC pin on bottom -->
    <text x="560" y="430" font-family="JetBrains Mono, monospace" font-size="8" fill="#e67e22" font-weight="500">MC</text>
    <circle cx="555" cy="425" r="3" fill="#e67e22"/>
  </g>

  <!-- 4. TOS7000 CH1 -->
  <g class="component" data-tooltip="Tos7000 CH1" data-desc="Servo/motor driver IC (Channel 1) for arm control. Connected via SPI interface (SDI1, CLK, CS) from Raspberry Pi.">
    <rect class="comp-box" x="720" y="80" width="120" height="70" rx="4" fill="rgba(37,99,235,0.05)" stroke="#2563eb" stroke-width="1.5"/>
    <text class="comp-label" x="780" y="110" font-family="JetBrains Mono, monospace" font-size="10" fill="#2563eb" text-anchor="middle" font-weight="600">TOS7000</text>
    <text x="780" y="124" font-family="JetBrains Mono, monospace" font-size="9" fill="#2563eb" text-anchor="middle" opacity="0.7">CH1</text>
    <line x1="745" y1="80" x2="745" y2="62" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="765" y1="80" x2="765" y2="62" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="785" y1="80" x2="785" y2="62" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="805" y1="80" x2="805" y2="62" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="745" cy="62" r="2.5" fill="#2563eb"/>
    <circle cx="765" cy="62" r="2.5" fill="#2563eb"/>
    <circle cx="785" cy="62" r="2.5" fill="#2563eb"/>
    <circle cx="805" cy="62" r="2.5" fill="#2563eb"/>
    <text x="775" y="56" font-family="JetBrains Mono, monospace" font-size="7" fill="#2563eb" text-anchor="middle" opacity="0.6">x4</text>
  </g>

  <!-- 5. TOS7000 CH2 -->
  <g class="component" data-tooltip="Tos7000 CH2" data-desc="Servo/motor driver IC (Channel 2) for arm control. Connected via SPI interface (SDI2, CLK, CS) from Raspberry Pi.">
    <rect class="comp-box" x="870" y="80" width="120" height="70" rx="4" fill="rgba(37,99,235,0.05)" stroke="#2563eb" stroke-width="1.5"/>
    <text class="comp-label" x="930" y="110" font-family="JetBrains Mono, monospace" font-size="10" fill="#2563eb" text-anchor="middle" font-weight="600">TOS7000</text>
    <text x="930" y="124" font-family="JetBrains Mono, monospace" font-size="9" fill="#2563eb" text-anchor="middle" opacity="0.7">CH2</text>
    <line x1="895" y1="80" x2="895" y2="62" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="915" y1="80" x2="915" y2="62" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="935" y1="80" x2="935" y2="62" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="955" y1="80" x2="955" y2="62" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="895" cy="62" r="2.5" fill="#2563eb"/>
    <circle cx="915" cy="62" r="2.5" fill="#2563eb"/>
    <circle cx="935" cy="62" r="2.5" fill="#2563eb"/>
    <circle cx="955" cy="62" r="2.5" fill="#2563eb"/>
    <text x="925" y="56" font-family="JetBrains Mono, monospace" font-size="7" fill="#2563eb" text-anchor="middle" opacity="0.6">x4</text>
  </g>

  <!-- 6. RESISTORS (2x 1k&#937; in PARALLEL) -->
  <g class="component" data-tooltip="2x 1k&#937; Resistors (Parallel)" data-desc="Base current limiting resistors in parallel for NPN transistor. Limits current from Raspberry Pi SC pin to safe levels for transistor switching. Parallel configuration halves effective resistance to 500&#937;.">
    <!-- Input wire (left junction) -->
    <circle cx="685" cy="380" r="3" fill="#4a4a4a"/>
    <!-- Top branch: Resistor 1 -->
    <line x1="685" y1="380" x2="685" y2="365" stroke="#4a4a4a" stroke-width="1.5"/>
    <line x1="685" y1="365" x2="695" y2="365" stroke="#4a4a4a" stroke-width="1.5"/>
    <polyline points="695,365 698,358 706,372 714,358 722,372 730,358 733,365" fill="none" stroke="#4a4a4a" stroke-width="1.6" stroke-linejoin="round"/>
    <line x1="733" y1="365" x2="745" y2="365" stroke="#4a4a4a" stroke-width="1.5"/>
    <text x="714" y="356" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7280" text-anchor="middle">1k&#937;</text>
    <!-- Bottom branch: Resistor 2 -->
    <line x1="685" y1="380" x2="685" y2="395" stroke="#4a4a4a" stroke-width="1.5"/>
    <line x1="685" y1="395" x2="695" y2="395" stroke="#4a4a4a" stroke-width="1.5"/>
    <polyline points="695,395 698,388 706,402 714,388 722,402 730,388 733,395" fill="none" stroke="#4a4a4a" stroke-width="1.6" stroke-linejoin="round"/>
    <line x1="733" y1="395" x2="745" y2="395" stroke="#4a4a4a" stroke-width="1.5"/>
    <text x="714" y="414" font-family="JetBrains Mono, monospace" font-size="8" fill="#6b7280" text-anchor="middle">1k&#937;</text>
    <!-- Output junction (right) -->
    <line x1="745" y1="365" x2="745" y2="395" stroke="#4a4a4a" stroke-width="1.5"/>
    <circle cx="745" cy="380" r="3" fill="#4a4a4a"/>
  </g>

  <!-- 7. NPN TRANSISTOR -->
  <g class="component" data-tooltip="NPN Transistor" data-desc="Switching transistor driven by Raspberry Pi SC pin through parallel 1k&#937; resistors. Switches relay coil on/off for HID circuit control.">
    <!-- Vertical base bar -->
    <line x1="790" y1="362" x2="790" y2="398" stroke="#4a4a4a" stroke-width="2"/>
    <!-- Base input -->
    <line x1="745" y1="380" x2="790" y2="380" stroke="#4a4a4a" stroke-width="1.5"/>

<script>
// ---- Tooltips ----
const tooltip = document.getElementById('tooltip');
const ttTitle = tooltip.querySelector('.tt-title');
const ttBody = tooltip.querySelector('.tt-body');

document.querySelectorAll('.component').forEach(comp => {
  comp.addEventListener('mouseenter', (e) => {
    const title = comp.getAttribute('data-tooltip');
    const desc = comp.getAttribute('data-desc');
    if (!title) return;
    ttTitle.textContent = title;
    ttBody.textContent = desc || '';
    tooltip.classList.add('visible');
  });

  comp.addEventListener('mousemove', (e) => {
    const x = e.clientX + 16;
    const y = e.clientY + 16;
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    tooltip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 8 : x) + 'px';
    tooltip.style.top = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
  });

  comp.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
});
</script>
