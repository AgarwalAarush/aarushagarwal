<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Infrastructure — Abyss</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #F3F2ED;
    --text-primary: #3a3a3a;
    --text-bright: #1a1a1a;
    --text-dim: #8a8580;
    --blue: #2563eb;
    --purple: #7c3aed;
    --slate: #475569;
    --orange: #e67e22;
    --tooltip-bg: rgba(243, 242, 237, 0.96);
    --tooltip-border: rgba(37, 99, 235, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    overflow-x: hidden;
    overflow-y: auto;
    width: 100vw;
    cursor: default;
  }

  #svg-container { width: 100%; }
  svg { width: 100%; height: auto; display: block; }

  .component { cursor: pointer; }
  .component:hover .comp-box { filter: brightness(1.08); stroke-width: 2.5; }
  .component:hover .comp-label { fill: var(--text-bright); }

  #tooltip {
    position: fixed;
    z-index: 200;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  #tooltip.visible { opacity: 1; transform: translateY(0); }
  #tooltip .tt-title { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; color: var(--blue); margin-bottom: 4px; }
  #tooltip .tt-body { color: var(--text-primary); font-size: 11px; }
</style>
</head>
<body>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-body"></div>
</div>

<div id="svg-container">
<svg viewBox="0 0 1200 960" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(180,175,160,0.2)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(160,155,140,0.3)" stroke-width="0.8"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="960" fill="#F3F2ED"/>
  <rect width="1200" height="960" fill="url(#grid)"/>

  <g transform="translate(0,20)">
  <!-- ============================================ -->
  <!-- SECTION 1: Compute                           -->
  <!-- ============================================ -->
  <text x="600" y="20" font-family="JetBrains Mono, monospace" font-size="14" fill="#475569" text-anchor="middle" font-weight="700">Compute</text>

  <!-- Amazon ECR -->
  <g class="component" data-tooltip="Amazon ECR" data-desc="Container registry storing the abyss-server:latest image (linux/amd64). ECS Fargate pulls from here on task launch.">
    <rect class="comp-box" x="55" y="55" width="240" height="80" rx="5" fill="rgba(37,99,235,0.04)" stroke="#2563eb" stroke-width="1.8"/>
    <text class="comp-label" x="175" y="80" font-family="JetBrains Mono, monospace" font-size="12" fill="#2563eb" text-anchor="middle" font-weight="600">Amazon ECR</text>
    <text x="175" y="100" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a" text-anchor="middle">abyss-server:latest</text>
    <text x="175" y="118" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8580" text-anchor="middle">(linux/amd64)</text>
  </g>

  <!-- Arrow ECR → ECS: "pull" -->
  <line x1="295" y1="95" x2="375" y2="95" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="335" y="88" font-family="JetBrains Mono, monospace" font-size="10" fill="#6b7280" text-anchor="middle">pull</text>

  <!-- ECS Fargate (cluster: abyss) -->
  <g class="component" data-tooltip="ECS Fargate" data-desc="Serverless container orchestration running the abyss cluster. Handles scaling, networking, and task lifecycle without managing EC2 instances.">
    <rect class="comp-box" x="385" y="45" width="770" height="210" rx="5" fill="rgba(37,99,235,0.04)" stroke="#2563eb" stroke-width="1.8"/>
    <text class="comp-label" x="405" y="72" font-family="JetBrains Mono, monospace" font-size="12" fill="#2563eb" font-weight="600">ECS Fargate (cluster: abyss)</text>
  </g>

  <!-- Task: abyss-server (nested) -->
  <g class="component" data-tooltip="Task: abyss-server" data-desc="The core ECS task running Node.js Conductor on port 8080. Uses separate IAM roles for execution (ECR + CloudWatch) and task-level access (Bedrock + Neptune + S3 + Knowledge Bases).">
    <rect class="comp-box" x="405" y="88" width="730" height="152" rx="4" fill="rgba(37,99,235,0.03)" stroke="#2563eb" stroke-width="1.2" stroke-dasharray="4,3"/>
    <text class="comp-label" x="425" y="112" font-family="JetBrains Mono, monospace" font-size="11" fill="#2563eb" font-weight="600">Task: abyss-server</text>
    <text x="425" y="138" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">Node.js Conductor</text>
    <text x="425" y="156" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">Port 8080</text>
    <text x="425" y="182" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a" font-weight="500">Roles:</text>

  </g>

  <!-- ============================================ -->

    <text class="comp-label" x="75" y="355" font-family="JetBrains Mono, monospace" font-size="12" fill="#7c3aed" font-weight="600">Bedrock</text>
    <text class="comp-label" x="75" y="373" font-family="JetBrains Mono, monospace" font-size="12" fill="#7c3aed" font-weight="600">Converse API</text>
    <text x="75" y="400" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">Nova Lite (default)</text>
    <text x="75" y="418" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">Nova Pro  (heavy)</text>

    <text x="75" y="454" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">Titan Embed V2</text>

  <g class="component" data-tooltip="Bedrock Knowledge Bases" data-desc="Managed RAG service for memory retrieval and vector search. Ingests context from S3 and surfaces relevant prior knowledge during sessions.">
    <rect class="comp-box" x="428" y="330" width="345" height="155" rx="5" fill="rgba(124,58,237,0.04)" stroke="#7c3aed" stroke-width="1.8"/>

    <text class="comp-label" x="820" y="355" font-family="JetBrains Mono, monospace" font-size="12" fill="#7c3aed" font-weight="600">Bedrock</text>
    <text class="comp-label" x="820" y="373" font-family="JetBrains Mono, monospace" font-size="12" fill="#7c3aed" font-weight="600">Agent Runtime</text>
    <text x="820" y="408" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">KB ingestion</text>
    <text x="820" y="426" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">S3 data source</text>

  <!-- ============================================ -->
  <!-- SECTION 3: Storage & Graph                   -->
  <!-- ============================================ -->

    <text x="75" y="618" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">Memory documents</text>

    <text x="448" y="636" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">OpenCypher queries</text>
    <text x="448" y="654" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">Vector + keyword</text>
    <text x="448" y="672" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">hybrid search</text>
  </g>

  <!-- CloudWatch Logs -->
  <g class="component" data-tooltip="CloudWatch Logs" data-desc="Centralized logging for the ECS abyss-server task. Captures structured JSON logs for debugging, monitoring, and alerting.">
    <rect class="comp-box" x="800" y="565" width="345" height="140" rx="5" fill="rgba(71,85,105,0.05)" stroke="#475569" stroke-width="1.8"/>
    <text class="comp-label" x="820" y="590" font-family="JetBrains Mono, monospace" font-size="12" fill="#475569" font-weight="600">CloudWatch Logs</text>
    <text x="820" y="618" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">/ecs/abyss-server</text>
    <text x="820" y="636" font-family="JetBrains Mono, monospace" font-size="10" fill="#3a3a3a">Structured JSON</text>
  </g>

  <!-- ============================================ -->
  <!-- SECTION 4: External Services                 -->
  <!-- ============================================ -->
  <text x="600" y="773" font-family="JetBrains Mono, monospace" font-size="14" fill="#e67e22" text-anchor="middle" font-weight="700">External Services</text>

  <!-- Row 1: 6 service boxes -->
  <!-- Gmail API -->
  <g class="component" data-tooltip="Gmail API" data-desc="Email triage, inbox scanning, and draft-before-send workflows via Gmail OAuth.">

  </g>

  <!-- Google Cal API -->
  <g class="component" data-tooltip="Google Calendar API" data-desc="Calendar management — create, update, and query events via Google OAuth.">
    <rect class="comp-box" x="241" y="785" width="170" height="65" rx="5" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="326" y="816" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Google Cal</text>
    <text x="326" y="834" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">API</text>
  </g>

  <!-- Canvas LMS API -->
  <g class="component" data-tooltip="Canvas LMS API" data-desc="Academic integration — course assignments, grades, and announcements from Canvas LMS.">
    <rect class="comp-box" x="427" y="785" width="170" height="65" rx="5" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="512" y="816" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Canvas LMS</text>
    <text x="512" y="834" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">API</text>

  <!-- Cursor Cloud Agents API -->

    <rect class="comp-box" x="613" y="785" width="170" height="65" rx="5" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="698" y="816" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#e67e22" text-anchor="middle" font-weight="600">Cursor Cloud</text>
    <text x="698" y="834" font-family="JetBrains Mono, monospace" font-size="10.5" fill="#e67e22" text-anchor="middle" font-weight="600">Agents API</text>
  </g>

  <!-- Brave Search API -->
  <g class="component" data-tooltip="Brave Search API" data-desc="Privacy-focused web search for real-time information retrieval during conversations.">
    <rect class="comp-box" x="799" y="785" width="170" height="65" rx="5" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="884" y="816" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Brave Search</text>
    <text x="884" y="834" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">API</text>
  </g>

  <!-- GitHub OAuth -->
  <g class="component" data-tooltip="GitHub OAuth" data-desc="GitHub-authenticated developer workflows — repo access, issue management, and PR operations.">

    <text class="comp-label" x="1070" y="824" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">GitHub OAuth</text>

  <!-- ElevenLabs (TTS) -->

</svg>
</div>

<script>
const tooltip = document.getElementById('tooltip');
const ttTitle = tooltip.querySelector('.tt-title');
const ttBody = tooltip.querySelector('.tt-body');

document.querySelectorAll('.component').forEach(comp => {
  comp.addEventListener('mouseenter', () => {
    const title = comp.getAttribute('data-tooltip');
    const desc = comp.getAttribute('data-desc');
    if (!title) return;
    ttTitle.textContent = title;
    ttBody.textContent = desc || '';
    tooltip.classList.add('visible');
  });
  comp.addEventListener('mousemove', (e) => {
    const x = e.clientX + 16, y = e.clientY + 16;
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    tooltip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 8 : x) + 'px';
    tooltip.style.top = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
  });
  comp.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
});
</script>
</body>
</html>
