<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software Architecture — AutoReflex</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #F3F2ED;
    --text-primary: #3a3a3a;
    --text-bright: #1a1a1a;
    --text-dim: #8a8580;
    --accent-green: #16a34a;
    --accent-blue: #2563eb;
    --accent-orange: #e67e22;
    --accent-red: #d63031;
    --accent-purple: #7c3aed;
    --tooltip-bg: rgba(243, 242, 237, 0.96);
    --tooltip-border: rgba(37, 99, 235, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: default;
  }

  #svg-container { width: 100vw; height: 100vh; }
  svg { width: 100%; height: 100%; }

  .component { cursor: pointer; }
  .component:hover .comp-box {
    filter: brightness(1.1);
    stroke-width: 2.5;
  }
  .component:hover .comp-label { fill: var(--text-bright); }

  #tooltip {
    position: fixed;
    z-index: 200;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  #tooltip.visible { opacity: 1; transform: translateY(0); }
  #tooltip .tt-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    color: var(--accent-blue);
    margin-bottom: 4px;
  }
  #tooltip .tt-body { color: var(--text-primary); font-size: 11px; }

  @keyframes dash-flow {
    to { stroke-dashoffset: -20; }
  }
  .data-flow {
    stroke-dasharray: 8 4;
    animation: dash-flow 1s linear infinite;
  }
</style>
</head>
<body>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-body"></div>
</div>

<div id="svg-container">
<svg id="diagram" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(180,175,160,0.2)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(160,155,140,0.3)" stroke-width="0.8"/>
    </pattern>
    <marker id="arrow-orange" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="#F3F2ED"/>
  <rect width="1000" height="520" fill="url(#grid)"/>

  <!-- ============================================ -->
  <!-- JETSON NANO enclosure                        -->
  <!-- ============================================ -->
  <g class="component" data-tooltip="Jetson Nano" data-desc="Vision processing node. Runs 100fps camera capture and HSV/YOLO detection pipeline, transmitting 20-byte UDP packets at 10.0.0.1.">
    <rect class="comp-box" x="60" y="60" width="280" height="400" rx="6" fill="rgba(22,163,74,0.04)" stroke="#16a34a" stroke-width="2"/>
    <text class="comp-label" x="200" y="95" font-family="JetBrains Mono, monospace" font-size="14" fill="#16a34a" text-anchor="middle" font-weight="700">JETSON NANO</text>
  </g>

  <!-- Arducam OV9782 -->
  <g class="component" data-tooltip="Arducam OV9782" data-desc="Global shutter camera capturing 1280×720 MJPEG at 100fps over USB 2.0 into a shallow frame queue.">
    <rect class="comp-box" x="110" y="140" width="180" height="75" rx="4" fill="rgba(22,163,74,0.06)" stroke="#16a34a" stroke-width="1.5"/>
    <text class="comp-label" x="200" y="170" font-family="JetBrains Mono, monospace" font-size="11" fill="#16a34a" text-anchor="middle" font-weight="600">Arducam OV9782</text>
    <text x="200" y="195" font-family="JetBrains Mono, monospace" font-size="10" fill="#15803d" text-anchor="middle" opacity="0.8">100fps MJPEG</text>
  </g>

  <!-- Arrow: Arducam → VisionProcessor -->
  <line x1="200" y1="215" x2="200" y2="270" stroke="#16a34a" stroke-width="1.5"/>
  <polygon points="194,265 200,275 206,265" fill="#16a34a"/>

  <!-- VisionProcessor -->
  <g class="component" data-tooltip="VisionProcessor" data-desc="Runs HSV color thresholding (~2ms) for Aimlabs targets or YOLO11n inference for Valorant enemy detection. Pre-allocated numpy buffers eliminate per-frame heap allocation.">
    <rect class="comp-box" x="110" y="280" width="180" height="75" rx="4" fill="rgba(22,163,74,0.06)" stroke="#16a34a" stroke-width="1.5"/>
    <text class="comp-label" x="200" y="310" font-family="JetBrains Mono, monospace" font-size="11" fill="#16a34a" text-anchor="middle" font-weight="600">VisionProcessor</text>
    <text x="200" y="335" font-family="JetBrains Mono, monospace" font-size="10" fill="#15803d" text-anchor="middle" opacity="0.8">HSV / YOLO</text>
  </g>

  <!-- IP address label -->
  <text x="200" y="430" font-family="JetBrains Mono, monospace" font-size="11" fill="#8a8580" text-anchor="middle" font-weight="500">10.0.0.1</text>

  <!-- ============================================ -->
  <!-- UDP arrow                                    -->
  <!-- ============================================ -->
  <line x1="340" y1="185" x2="620" y2="185" stroke="#e67e22" stroke-width="2" class="data-flow" marker-end="url(#arrow-orange)"/>
  <text x="480" y="170" font-family="JetBrains Mono, monospace" font-size="12" fill="#e67e22" text-anchor="middle" font-weight="600">UDP (20 bytes)</text>
  <text x="480" y="210" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a8580" text-anchor="middle">timestamp | tx | cx | blob_w</text>

  <!-- ============================================ -->
  <!-- RASPBERRY PI enclosure                       -->
  <!-- ============================================ -->
  <g class="component" data-tooltip="Raspberry Pi 4/5" data-desc="Control node running 1kHz busy-spin PID loop with <5µs jitter. Receives UDP packets and drives servo, solenoid, and TENS outputs at 10.0.0.2.">
    <rect class="comp-box" x="640" y="60" width="300" height="400" rx="6" fill="rgba(37,99,235,0.04)" stroke="#2563eb" stroke-width="2"/>
    <text class="comp-label" x="790" y="95" font-family="JetBrains Mono, monospace" font-size="14" fill="#2563eb" text-anchor="middle" font-weight="700">RASPBERRY PI 4/5</text>
  </g>

  <!-- 1kHz PID Loop label -->
  <text x="790" y="130" font-family="JetBrains Mono, monospace" font-size="11" fill="#2563eb" text-anchor="middle" font-weight="500" opacity="0.8">1kHz PID Loop</text>

  <!-- ST3215 -->
  <g class="component" data-tooltip="ST3215 Servo" data-desc="Feetech ST3215 12-bit digital servo (4096 steps/360°) driven over half-duplex UART at 1 Mbps for mechanical aim correction.">
    <rect class="comp-box" x="680" y="160" width="100" height="55" rx="4" fill="rgba(37,99,235,0.06)" stroke="#2563eb" stroke-width="1.5"/>
    <text class="comp-label" x="730" y="185" font-family="JetBrains Mono, monospace" font-size="11" fill="#2563eb" text-anchor="middle" font-weight="600">ST3215</text>
    <text x="730" y="202" font-family="JetBrains Mono, monospace" font-size="8" fill="#2563eb" text-anchor="middle" opacity="0.6">SERVO</text>
  </g>
  <text x="850" y="192" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8580" font-weight="500">Servo (UART 1Mbps)</text>

  <!-- Solenoid -->
  <g class="component" data-tooltip="Solenoid" data-desc="Mouse click actuator fired via GPIO when pixel error drops below 5px threshold. MOSFET-driven for fast switching.">
    <rect class="comp-box" x="680" y="250" width="100" height="55" rx="4" fill="rgba(214,48,49,0.05)" stroke="#d63031" stroke-width="1.5"/>
    <text class="comp-label" x="730" y="275" font-family="JetBrains Mono, monospace" font-size="11" fill="#d63031" text-anchor="middle" font-weight="600">Solenoid</text>
    <text x="730" y="292" font-family="JetBrains Mono, monospace" font-size="8" fill="#d63031" text-anchor="middle" opacity="0.6">TRIGGER</text>
  </g>
  <text x="850" y="282" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8580" font-weight="500">Trigger (GPIO)</text>

  <!-- TENS -->
  <g class="component" data-tooltip="TENS Unit" data-desc="Transcutaneous electrical nerve stimulation modulated by two MCP4131 digital potentiometers over SPI. Intensity scales with pixel error for fast muscle correction (~1ms).">
    <rect class="comp-box" x="680" y="340" width="100" height="55" rx="4" fill="rgba(124,58,237,0.05)" stroke="#7c3aed" stroke-width="1.5"/>
    <text class="comp-label" x="730" y="365" font-family="JetBrains Mono, monospace" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="600">TENS</text>
    <text x="730" y="382" font-family="JetBrains Mono, monospace" font-size="8" fill="#7c3aed" text-anchor="middle" opacity="0.6">EMS</text>
  </g>
  <text x="850" y="372" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8580" font-weight="500">EMS (SPI/MCP4131)</text>

  <!-- IP address label -->
  <text x="790" y="430" font-family="JetBrains Mono, monospace" font-size="11" fill="#8a8580" text-anchor="middle" font-weight="500">10.0.0.2</text>

</svg>
</div>

<script>
// ---- Tooltips ----
const tooltip = document.getElementById('tooltip');
const ttTitle = tooltip.querySelector('.tt-title');
const ttBody = tooltip.querySelector('.tt-body');

document.querySelectorAll('.component').forEach(comp => {
  comp.addEventListener('mouseenter', (e) => {
    const title = comp.getAttribute('data-tooltip');
    const desc = comp.getAttribute('data-desc');
    if (!title) return;
    ttTitle.textContent = title;
    ttBody.textContent = desc || '';
    tooltip.classList.add('visible');
  });

  comp.addEventListener('mousemove', (e) => {
    const x = e.clientX + 16;
    const y = e.clientY + 16;
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    tooltip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 8 : x) + 'px';
    tooltip.style.top = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
  });

  comp.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });
});
</script>
</body>
</html>
