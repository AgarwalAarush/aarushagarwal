<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Architecture — Abyss</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #F3F2ED;
    --text-primary: #3a3a3a;
    --text-bright: #1a1a1a;
    --text-dim: #8a8580;
    --green: #16a34a;
    --blue: #2563eb;
    --orange: #e67e22;
    --purple: #7c3aed;
    --slate: #475569;
    --tooltip-bg: rgba(243, 242, 237, 0.96);
    --tooltip-border: rgba(37, 99, 235, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    overflow-x: hidden;
    overflow-y: auto;
    width: 100vw;
    cursor: default;
  }

  #svg-container { width: 100%; }
  svg { width: 100%; height: auto; display: block; }

  .component { cursor: pointer; }
  .component:hover .comp-box { filter: brightness(1.08); stroke-width: 2.5; }
  .component:hover .comp-label { fill: var(--text-bright); }

  #tooltip {
    position: fixed;
    z-index: 200;
    background: var(--tooltip-bg);
    border: 1px solid var(--tooltip-border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.15s, transform 0.15s;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  #tooltip.visible { opacity: 1; transform: translateY(0); }
  #tooltip .tt-title { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; color: var(--blue); margin-bottom: 4px; }
  #tooltip .tt-body { color: var(--text-primary); font-size: 11px; }
</style>
</head>
<body>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-body"></div>
</div>

<div id="svg-container">
<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(180,175,160,0.2)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(160,155,140,0.3)" stroke-width="0.8"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#e67e22"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1000" fill="#F3F2ED"/>
  <rect width="1200" height="1000" fill="url(#grid)"/>

  <!-- ============================================ -->
  <!-- ROW 1: Neptune Analytics                     -->
  <!-- ============================================ -->
  <g class="component" data-tooltip="Neptune Analytics" data-desc="Amazon Neptune Analytics stores the context graph — User, Session, Goal, Decision, Blocker, and MemoryEpisode nodes — enabling hybrid vector + graph search for session recall.">
    <rect class="comp-box" x="450" y="25" width="220" height="58" rx="5" fill="rgba(71,85,105,0.05)" stroke="#475569" stroke-width="1.8"/>
    <text class="comp-label" x="560" y="50" font-family="JetBrains Mono, monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="600">Neptune Analytics</text>
    <text x="560" y="67" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569" text-anchor="middle" opacity="0.7">(Graph DB)</text>
  </g>

  <!-- Neptune → Titan (left) -->
  <line x1="510" y1="83" x2="402" y2="130" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <!-- Neptune → S3 (right) -->
  <line x1="610" y1="83" x2="712" y2="130" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ============================================ -->
  <!-- ROW 2: Titan Embeddings + S3                 -->
  <!-- ============================================ -->
  <g class="component" data-tooltip="Amazon Titan Embeddings" data-desc="Amazon Titan Text Embeddings V2 (d=256) generates semantic embeddings per goal for hybrid vector + graph search retrieval.">
    <rect class="comp-box" x="310" y="130" width="185" height="58" rx="5" fill="rgba(71,85,105,0.05)" stroke="#475569" stroke-width="1.8"/>
    <text class="comp-label" x="402" y="156" font-family="JetBrains Mono, monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="600">Titan</text>
    <text x="402" y="173" font-family="JetBrains Mono, monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="600">Embeddings</text>
  </g>

  <g class="component" data-tooltip="S3 Memory Store" data-desc="Amazon S3 stores conversation summaries and MemoryService fallback data when Neptune is unavailable.">
    <rect class="comp-box" x="620" y="130" width="185" height="58" rx="5" fill="rgba(71,85,105,0.05)" stroke="#475569" stroke-width="1.8"/>
    <text class="comp-label" x="712" y="156" font-family="JetBrains Mono, monospace" font-size="12" fill="#475569" text-anchor="middle" font-weight="600">S3</text>
    <text x="712" y="173" font-family="JetBrains Mono, monospace" font-size="10" fill="#475569" text-anchor="middle" opacity="0.7">(Memory Store)</text>
  </g>

  <!-- Titan → Conductor -->
  <line x1="402" y1="188" x2="402" y2="240" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>
  <!-- S3 → Conductor -->
  <line x1="712" y1="188" x2="712" y2="240" stroke="#6b7280" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ============================================ -->
  <!-- ROW 3: iOS App + Conductor Server            -->
  <!-- ============================================ -->

  <!-- iOS App -->
  <g class="component" data-tooltip="iOS App" data-desc="SwiftUI voice interface with WhisperKit on-device STT, ElevenLabs TTS, WebSocket auto-reconnect, Apple Keychain credentials, and ASWebAuthenticationSession for OAuth.">
    <rect class="comp-box" x="30" y="240" width="185" height="165" rx="5" fill="rgba(22,163,74,0.04)" stroke="#16a34a" stroke-width="2"/>
    <text class="comp-label" x="122" y="266" font-family="JetBrains Mono, monospace" font-size="13" fill="#16a34a" text-anchor="middle" font-weight="700">iOS App</text>
    <text x="55" y="292" font-family="JetBrains Mono, monospace" font-size="10" fill="#15803d">· SwiftUI</text>
    <text x="55" y="309" font-family="JetBrains Mono, monospace" font-size="10" fill="#15803d">· WhisperKit (STT)</text>
    <text x="55" y="326" font-family="JetBrains Mono, monospace" font-size="10" fill="#15803d">· ElevenLabs (TTS)</text>
    <text x="55" y="343" font-family="JetBrains Mono, monospace" font-size="10" fill="#15803d">· OAuth</text>
  </g>

  <!-- WebSocket arrow: iOS → Conductor -->
  <line x1="215" y1="300" x2="280" y2="300" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="222" y="293" font-family="JetBrains Mono, monospace" font-size="9" fill="#2563eb">WebSocket</text>
  <!-- Events arrow: Conductor → iOS -->

  <text x="222" y="315" font-family="JetBrains Mono, monospace" font-size="9" fill="#16a34a">Events</text>

  <!-- Conductor Server outer -->
  <g class="component" data-tooltip="Node.js Conductor Server" data-desc="Node.js + TypeScript WebSocket server on AWS ECS Fargate. Orchestrates conversation turns, tool dispatch, and streaming responses via Amazon Bedrock. Dynamic routing between Nova Lite, Nova Pro, and Nova Sonic.">
    <rect class="comp-box" x="280" y="240" width="870" height="165" rx="5" fill="rgba(37,99,235,0.04)" stroke="#2563eb" stroke-width="2"/>
    <text class="comp-label" x="715" y="265" font-family="JetBrains Mono, monospace" font-size="13" fill="#2563eb" text-anchor="middle" font-weight="700">Node.js Conductor Server</text>
    <text x="715" y="281" font-family="JetBrains Mono, monospace" font-size="10" fill="#2563eb" text-anchor="middle" opacity="0.7">(ECS Fargate)</text>
  </g>

  <!-- Bedrock Nova — x=355, w=185, center=447 -->
  <g class="component" data-tooltip="Bedrock Nova Lite / Pro" data-desc="Amazon Bedrock routes between Nova Lite (fast, cheap for everyday tasks) and Nova Pro (deep coding and agent workflows) based on task complexity.">
    <rect class="comp-box" x="355" y="293" width="185" height="62" rx="4" fill="rgba(37,99,235,0.06)" stroke="#2563eb" stroke-width="1.5"/>
    <text class="comp-label" x="447" y="315" font-family="JetBrains Mono, monospace" font-size="11" fill="#2563eb" text-anchor="middle" font-weight="600">Bedrock Nova</text>
    <text x="447" y="331" font-family="JetBrains Mono, monospace" font-size="10" fill="#2563eb" text-anchor="middle" opacity="0.7">Lite / Pro</text>
  </g>

  <!-- Anthropic Claude — x=620, w=185, center=712 -->
  <g class="component" data-tooltip="Anthropic Claude" data-desc="Claude is used alongside Bedrock Nova for specific tool workflows and coding tasks via the conductor's model routing logic.">
    <rect class="comp-box" x="620" y="293" width="185" height="62" rx="4" fill="rgba(37,99,235,0.06)" stroke="#2563eb" stroke-width="1.5"/>
    <text class="comp-label" x="712" y="328" font-family="JetBrains Mono, monospace" font-size="11" fill="#2563eb" text-anchor="middle" font-weight="600">Anthropic Claude</text>
  </g>

  <!-- Nova Sonic — x=885, w=185, center=977 -->
  <g class="component" data-tooltip="Nova Sonic" data-desc="Amazon Nova Sonic provides real-time bidirectional voice streaming — end-to-end voice without the WhisperKit → TTS chain for latency-critical interactions.">
    <rect class="comp-box" x="885" y="293" width="185" height="62" rx="4" fill="rgba(37,99,235,0.06)" stroke="#2563eb" stroke-width="1.5"/>
    <text class="comp-label" x="977" y="315" font-family="JetBrains Mono, monospace" font-size="11" fill="#2563eb" text-anchor="middle" font-weight="600">Nova Sonic</text>
    <text x="977" y="331" font-family="JetBrains Mono, monospace" font-size="10" fill="#2563eb" text-anchor="middle" opacity="0.7">(Voice Stream)</text>
  </g>

  <!-- ============================================ -->
  <!-- ARROWS: Conductor bottom → Service box tops  -->
  <!-- ============================================ -->
  <line x1="380" y1="405" x2="112"  y2="455" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="405" x2="297"  y2="455" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="560" y1="405" x2="482"  y2="455" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="660" y1="405" x2="672"  y2="455" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="810" y1="405" x2="862"  y2="455" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="1080" y1="405" x2="1087" y2="455" stroke="#6b7280" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ============================================ -->
  <!-- ROW 4: Service boxes  (y=455)                -->
  <!-- ============================================ -->

  <!-- Gmail API  (5 bullets → h=140) -->
  <g class="component" data-tooltip="Gmail API" data-desc="Inbox triage, search, read, and compose. Send and reply require iOS user confirmation (⚡) before dispatch.">
    <rect class="comp-box" x="30" y="455" width="165" height="140" rx="4" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="112" y="479" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Gmail API</text>
    <text x="50" y="502" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· inbox</text>
    <text x="50" y="518" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· search</text>
    <text x="50" y="534" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· read</text>
    <text x="50" y="550" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· send ⚡</text>
    <text x="50" y="566" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· reply ⚡</text>
  </g>

  <!-- Google Calendar API  (4 bullets → h=140) -->
  <g class="component" data-tooltip="Google Calendar API" data-desc="List, create, and update calendar events. Delete requires iOS user confirmation (⚡).">
    <rect class="comp-box" x="215" y="455" width="165" height="140" rx="4" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="297" y="479" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Google Calendar</text>
    <text x="297" y="495" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">API</text>
    <text x="235" y="518" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· list</text>
    <text x="235" y="534" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· create</text>
    <text x="235" y="550" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· update</text>
    <text x="235" y="566" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· delete ⚡</text>
  </g>

  <!-- Canvas LMS  (3 bullets → h=110) -->
  <g class="component" data-tooltip="Canvas LMS" data-desc="Reads todos, grades, and assignment data from Canvas Learning Management System.">
    <rect class="comp-box" x="400" y="455" width="165" height="110" rx="4" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="482" y="479" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Canvas LMS</text>
    <text x="420" y="502" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· todo</text>
    <text x="420" y="518" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· grades</text>
    <text x="420" y="534" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· assgn</text>
  </g>

  <!-- Cursor Cloud Agents  (4 bullets → h=140) -->
  <g class="component" data-tooltip="Cursor Cloud Agents" data-desc="Spawns, monitors, and cancels Cursor cloud coding agents. Followup dispatches continuation tasks to running agents.">
    <rect class="comp-box" x="585" y="455" width="175" height="140" rx="4" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="672" y="479" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Cursor Cloud</text>
    <text x="672" y="495" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Agents</text>
    <text x="605" y="518" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· spawn</text>
    <text x="605" y="534" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· status</text>
    <text x="605" y="550" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· cancel</text>
    <text x="605" y="566" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· followup</text>
  </g>

  <!-- Brave Search  (2 bullets → h=100) -->
  <g class="component" data-tooltip="Brave Search" data-desc="Privacy-respecting web search. Returns grounded results without tracking or personalization bias.">
    <rect class="comp-box" x="780" y="455" width="165" height="100" rx="4" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="862" y="479" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">Brave Search</text>
    <text x="800" y="502" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· web</text>
    <text x="800" y="518" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· search</text>
  </g>

  <!-- GitHub OAuth  (2 bullets → h=100) -->
  <g class="component" data-tooltip="GitHub OAuth" data-desc="GitHub-authenticated developer workflows — repository access, auth token management, and developer context.">
    <rect class="comp-box" x="1005" y="455" width="165" height="100" rx="4" fill="rgba(230,126,34,0.04)" stroke="#e67e22" stroke-width="1.5"/>
    <text class="comp-label" x="1087" y="479" font-family="JetBrains Mono, monospace" font-size="11" fill="#e67e22" text-anchor="middle" font-weight="600">GitHub OAuth</text>
    <text x="1025" y="502" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· auth</text>
    <text x="1025" y="518" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· repos</text>
  </g>

  <!-- ⚡ legend -->
  <text x="30" y="618" font-family="JetBrains Mono, monospace" font-size="10" fill="#8a8580">⚡ = iOS user confirmation required</text>

  <!-- ============================================ -->
  <!-- Cursor Cloud Agents → Bridge Router          -->
  <!-- ============================================ -->
  <line x1="672" y1="595" x2="672" y2="638" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Bridge Router -->
  <g class="component" data-tooltip="Bridge Router" data-desc="Routes privileged local execution requests from the Conductor to the paired macOS bridge over a secured persistent connection.">
    <rect class="comp-box" x="555" y="638" width="235" height="50" rx="5" fill="rgba(124,58,237,0.05)" stroke="#7c3aed" stroke-width="1.8"/>
    <text class="comp-label" x="672" y="669" font-family="JetBrains Mono, monospace" font-size="12" fill="#7c3aed" text-anchor="middle" font-weight="600">Bridge Router</text>
  </g>

  <!-- Bridge Router → macOS Bridge -->
  <line x1="672" y1="688" x2="672" y2="740" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ============================================ -->
  <!-- macOS Bridge outer box  (y=740, h=235)       -->
  <!-- ============================================ -->
  <g class="component" data-tooltip="macOS Bridge" data-desc="Swift app with per-capability permission toggles and workspace root constraints. Bridges shell execution, file operations, git workflows, Claude Code, and Nova Act browser automation.">
    <rect class="comp-box" x="195" y="740" width="810" height="235" rx="6" fill="rgba(124,58,237,0.03)" stroke="#7c3aed" stroke-width="2"/>
    <text class="comp-label" x="600" y="763" font-family="JetBrains Mono, monospace" font-size="13" fill="#7c3aed" text-anchor="middle" font-weight="700">macOS Bridge</text>
  </g>

  <!-- Command Executor  (5 bullets → h=145) -->
  <g class="component" data-tooltip="Command Executor" data-desc="Shell execution, file read/search/patch, and git.* workflows. All scoped to the workspace root defined at bridge pairing time.">
    <rect class="comp-box" x="225" y="773" width="230" height="145" rx="4" fill="rgba(124,58,237,0.05)" stroke="#7c3aed" stroke-width="1.5"/>
    <text class="comp-label" x="340" y="798" font-family="JetBrains Mono, monospace" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="600">Command Executor</text>
    <text x="247" y="821" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· exec.run</text>
    <text x="247" y="837" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· fs.read</text>
    <text x="247" y="853" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· fs.search</text>

    <text x="247" y="885" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· git.*</text>
  </g>

  <!-- Claude Code  (title + subtitle + 3 bullets → h=120) -->
  <g class="component" data-tooltip="Claude Code (Subprocess)" data-desc="Claude Code runs as a subprocess on the macOS bridge, executing Bash, Read, Edit, Write, Glob, and Grep tools within the permissioned workspace.">
    <rect class="comp-box" x="495" y="773" width="230" height="120" rx="4" fill="rgba(124,58,237,0.05)" stroke="#7c3aed" stroke-width="1.5"/>
    <text class="comp-label" x="610" y="798" font-family="JetBrains Mono, monospace" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="600">Claude Code</text>
    <text x="517" y="825" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· Bash, Read</text>
    <text x="517" y="841" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· Edit, Write</text>
    <text x="517" y="857" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#3a3a3a">· Glob, Grep</text>
  </g>

<script>
const tooltip = document.getElementById('tooltip');
const ttTitle = tooltip.querySelector('.tt-title');
const ttBody = tooltip.querySelector('.tt-body');

document.querySelectorAll('.component').forEach(comp => {
  comp.addEventListener('mouseenter', () => {
    const title = comp.getAttribute('data-tooltip');
    const desc = comp.getAttribute('data-desc');
    if (!title) return;
    ttTitle.textContent = title;
    ttBody.textContent = desc || '';
    tooltip.classList.add('visible');
  });
  comp.addEventListener('mousemove', (e) => {
    const x = e.clientX + 16, y = e.clientY + 16;
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    tooltip.style.left = (x + tw > window.innerWidth ? e.clientX - tw - 8 : x) + 'px';
    tooltip.style.top = (y + th > window.innerHeight ? e.clientY - th - 8 : y) + 'px';
  });
  comp.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
});
</script>
